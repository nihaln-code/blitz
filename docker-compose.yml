services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/ml:/app/ml
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    dns:
      - 8.8.8.8
      - 8.8.4.4

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
